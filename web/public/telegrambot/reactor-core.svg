<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reactor core">
  <defs>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(260)">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#b6fbff"/>
      <stop offset="0.45" stop-color="#45efff"/>
      <stop offset="1" stop-color="#021017"/>
    </radialGradient>
    <linearGradient id="steel" x1="240" y1="192" x2="784" y2="832" gradientUnits="userSpaceOnUse">
